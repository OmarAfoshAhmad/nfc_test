name: Build NFC Reader

on:
  workflow_dispatch:

jobs:
  build:
    name: Build legacy reader (if present)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 20.x
      uses: actions/setup-node@v5
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Check legacy folder
      id: check_legacy
      shell: bash
      run: |
        if [ -d "nfc-reader-simple" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Dependencies
      if: steps.check_legacy.outputs.exists == 'true'
      working-directory: ./nfc-reader-simple
      run: npm ci

    - name: Build Secure Reader
      if: steps.check_legacy.outputs.exists == 'true'
      working-directory: ./nfc-reader-simple
      env:
        # These secrets must be added in GitHub Repo Settings > Secrets
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        TERMINAL_ID: ${{ secrets.TERMINAL_ID }}
      run: node build-reader.js

    - name: Upload Artifacts
      if: steps.check_legacy.outputs.exists == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: nfc-reader-${{ runner.os }}-${{ runner.arch }}
        path: nfc-reader-simple/dist/*

    - name: Skip notice
      if: steps.check_legacy.outputs.exists != 'true'
      run: echo "Legacy folder nfc-reader-simple not found. Workflow skipped intentionally."

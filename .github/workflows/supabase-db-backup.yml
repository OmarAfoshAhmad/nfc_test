name: Supabase DB Backup (pg_dump)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

concurrency:
  group: supabase-db-backup
  cancel-in-progress: false

jobs:
  backup:
    name: Create backup artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install PostgreSQL client and OpenSSL
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client openssl

      - name: Validate required secrets
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          required=(SUPABASE_DB_HOST SUPABASE_DB_PORT SUPABASE_DB_NAME SUPABASE_DB_USER SUPABASE_DB_PASSWORD)
          for v in "${required[@]}"; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Prepare filenames
        run: |
          set -euo pipefail
          ts="$(date -u +'%Y%m%d-%H%M%S')"
          base="supabase-backup-${ts}"
          echo "TS=$ts" >> "$GITHUB_ENV"
          echo "BASE=$base" >> "$GITHUB_ENV"
          echo "DUMP_FILE=${base}.dump" >> "$GITHUB_ENV"
          echo "SHA_FILE=${base}.sha256" >> "$GITHUB_ENV"
          echo "TOC_FILE=${base}.toc.txt" >> "$GITHUB_ENV"
          echo "ENC_FILE=${base}.dump.enc" >> "$GITHUB_ENV"

      - name: Run pg_dump (custom format)
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGHOST: ${{ secrets.SUPABASE_DB_HOST }}
          PGPORT: ${{ secrets.SUPABASE_DB_PORT }}
          PGDATABASE: ${{ secrets.SUPABASE_DB_NAME }}
          PGUSER: ${{ secrets.SUPABASE_DB_USER }}
        run: |
          set -euo pipefail
          pg_dump \
            --format=custom \
            --compress=9 \
            --no-owner \
            --no-privileges \
            --file "$DUMP_FILE"

      - name: Integrity and restoreability checks
        run: |
          set -euo pipefail
          sha256sum "$DUMP_FILE" > "$SHA_FILE"
          pg_restore --list "$DUMP_FILE" > "$TOC_FILE"
          test -s "$TOC_FILE"

      - name: Optional encryption (AES-256)
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -n "${BACKUP_PASSPHRASE:-}" ]; then
            printf '%s' "$BACKUP_PASSPHRASE" > .backup_pass
            openssl enc -aes-256-cbc -pbkdf2 -salt \
              -in "$DUMP_FILE" \
              -out "$ENC_FILE" \
              -pass file:.backup_pass
            rm -f .backup_pass "$DUMP_FILE"
            echo "Encryption enabled."
          else
            echo "No BACKUP_PASSPHRASE provided. Keeping unencrypted dump artifact."
          fi

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-db-backup-${{ env.TS }}
          retention-days: 14
          if-no-files-found: error
          path: |
            ${{ env.DUMP_FILE }}
            ${{ env.ENC_FILE }}
            ${{ env.SHA_FILE }}
            ${{ env.TOC_FILE }}

      - name: Job summary
        run: |
          {
            echo "## Supabase backup completed"
            echo "- Timestamp (UTC): $TS"
            if [ -f "$ENC_FILE" ]; then
              echo "- Backup file: $ENC_FILE"
            else
              echo "- Backup file: $DUMP_FILE"
            fi
            echo "- Checksum file: $SHA_FILE"
            echo "- TOC file: $TOC_FILE"
          } >> "$GITHUB_STEP_SUMMARY"

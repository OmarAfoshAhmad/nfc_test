name: Build NFC Bridge Executables

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: node20-win-x64
            label: windows-x64
          - os: macos-14
            target: node20-macos-x64
            label: macos-intel-x64
          - os: macos-14
            target: node20-macos-arm64
            label: macos-apple-silicon-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
          YAMEN_SECRET: ${{ secrets.YAMEN_SECRET != '' && secrets.YAMEN_SECRET || secrets.NFC_SIGNATURE_SECRET }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${SUPABASE_URL:-}" ] || missing+=("SUPABASE_URL (or NEXT_PUBLIC_SUPABASE_URL)")
          [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ] || missing+=("SUPABASE_SERVICE_ROLE_KEY (or SUPABASE_SERVICE_KEY)")
          [ -n "${YAMEN_SECRET:-}" ] || missing+=("YAMEN_SECRET (or NFC_SIGNATURE_SECRET)")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build executable
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
          YAMEN_SECRET: ${{ secrets.YAMEN_SECRET != '' && secrets.YAMEN_SECRET || secrets.NFC_SIGNATURE_SECRET }}
        run: node scripts/build-bridge.mjs --target ${{ matrix.target }}

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfc-bridge-${{ matrix.label }}
          if-no-files-found: error
          path: |
            dist-bin/${{ matrix.target }}-nfc-bridge*

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nfc-bridge-*
          merge-multiple: true
          path: release-assets

      - name: Create checksums
        shell: bash
        run: |
          cd release-assets
          ls -la
          VERSION="${GITHUB_REF_NAME}"

          cat > TERMINAL_CONFIGE.template.json << 'JSON'
          {
            "terminalId": 1,
            "terminalName": "Scanner-01"
          }
          JSON

          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in
              *.exe)
                mv "$f" "nfc-bridge-${VERSION}-${f}"
                ;;
              *)
                mv "$f" "nfc-bridge-${VERSION}-${f}"
                ;;
            esac
          done

          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*
